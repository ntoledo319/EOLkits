# Verbatim-error /fix corpus — drives /fix/<slug> AEO pages (M2).
#
# Each entry is keyed on a REAL error string a developer pastes into search or an
# LLM. Every fix is hand-verified against a primary source (cited in source_url).
# Dates come ONLY from the AWS Lambda runtime deprecation table — secondary blogs
# carry stale pre-delay dates and must not be used. Fabricating error strings to
# rank would be scaled-content-abuse; these are sourced, not generated.
#
# Schema per entry:
#   slug            URL slug (/fix/<slug>/)
#   error           the verbatim error string (the <h1> + code block + search key)
#   context         short label, e.g. "Python 3.12", "AWS Lambda", "Amazon Linux 2023", "Node.js 22"
#   summary         one-sentence plain-English meaning
#   cause           why it happens (the real root cause)
#   fix_steps       ordered, correct remediation steps
#   source_url      primary source backing the fix
#   related_migrate slug of the /migrate/<slug> page to cross-link (optional)
#   kit             the EOLkits kit that automates this (optional)

fixes:
  - slug: amazon-linux-extras-command-not-found
    error: "amazon-linux-extras: command not found"
    context: "Amazon Linux 2023"
    summary: "The amazon-linux-extras mechanism was removed in Amazon Linux 2023; it only exists on Amazon Linux 2."
    cause: "Amazon Linux 2023 dropped the Extras Library. Packages that used to live behind amazon-linux-extras are now either default dnf packages, version-namespaced packages (e.g. python3.11, nginx1.24), or available through SPAL (Supplementary Packages for Amazon Linux)."
    fix_steps:
      - "Stop calling amazon-linux-extras — it does not exist on AL2023."
      - "Install the package directly with dnf, e.g. `sudo dnf install -y python3.11`."
      - "For a specific minor version, use the version-namespaced package name (python3.11, nginx1.24, postgresql15, etc.)."
      - "For packages that were EPEL-backed, enable SPAL instead of the old extras topics."
      - "Update Dockerfiles and user-data scripts that still run `amazon-linux-extras enable ...` / `install`."
    source_url: "https://docs.aws.amazon.com/linux/al2023/ug/compare-with-al2.html"
    related_migrate: amazon-linux-2-eol
    kit: al2023-gate

  - slug: python-no-module-named-distutils
    error: "ModuleNotFoundError: No module named 'distutils'"
    context: "Python 3.12"
    summary: "Python 3.12 removed the standard-library distutils module (PEP 632)."
    cause: "distutils was deprecated in Python 3.10 and fully removed in 3.12. Code (or a dependency) still imports it. This commonly surfaces after moving a Lambda function or container to a Python 3.12 runtime."
    fix_steps:
      - "Interim: install setuptools, which still vendors a distutils shim — `pip install 'setuptools<81'` — and ensure it is in your deployment package."
      - "Durable: replace `distutils` usage with `setuptools` and the `packaging` library (e.g. `packaging.version.Version` instead of `distutils.version.LooseVersion`)."
      - "Upgrade dependencies that import distutils to versions that no longer do."
      - "Re-test on Python 3.12 locally before redeploying."
    source_url: "https://docs.python.org/3/whatsnew/3.12.html"
    related_migrate: lambda-python-3.9-eol
    kit: python-pivot

  - slug: python-no-module-named-imp
    error: "ModuleNotFoundError: No module named 'imp'"
    context: "Python 3.12"
    summary: "The deprecated imp module was removed in Python 3.12."
    cause: "imp was deprecated since Python 3.4 and removed in 3.12. A dependency or your own code still imports it."
    fix_steps:
      - "Replace `imp` with `importlib` — e.g. `importlib.util.find_spec`, `importlib.import_module`, `importlib.machinery` instead of `imp.find_module` / `imp.load_module`."
      - "Upgrade any third-party package that still imports imp to a current release."
      - "Re-run your test suite on Python 3.12."
    source_url: "https://docs.python.org/3/whatsnew/3.12.html"
    related_migrate: lambda-python-3.9-eol
    kit: python-pivot

  - slug: collections-has-no-attribute-mapping
    error: "AttributeError: module 'collections' has no attribute 'Mapping'"
    context: "Python 3.10+"
    summary: "The abstract base classes moved from collections to collections.abc; the old aliases were removed in Python 3.10."
    cause: "collections.Mapping (and Sequence, Iterable, etc.) were deprecated aliases since Python 3.3 and removed in 3.10. Older code or a stale dependency still references collections.Mapping."
    fix_steps:
      - "Import from collections.abc: `from collections.abc import Mapping`."
      - "Replace references like `collections.Mapping` with `collections.abc.Mapping`."
      - "Upgrade dependencies that still use the old path (a common offender in older pyyaml/jsonschema pins)."
    source_url: "https://docs.python.org/3/whatsnew/3.10.html"
    related_migrate: lambda-python-3.9-eol
    kit: python-pivot

  - slug: lambda-python-runtime-no-longer-supported
    error: "The runtime parameter of python3.9 is no longer supported for creating or updating AWS Lambda functions"
    context: "AWS Lambda"
    summary: "AWS Lambda is blocking create/update operations on a deprecated Python runtime."
    cause: "Per the AWS Lambda runtime deprecation table, python3.9 was deprecated on 2025-12-15; AWS blocks creating new python3.9 functions on 2027-02-01 and updating existing ones on 2027-03-03 (AWS delayed these beyond the usual 30/60 days). Earlier runtimes such as python3.7 are already blocked for create. The error fires when a deploy targets a runtime past its block date."
    fix_steps:
      - "Change the runtime to a supported version — AWS recommends python3.12 (python3.13 is also available)."
      - "SAM/CloudFormation: `Runtime: python3.12`. CDK: `runtime: lambda.Runtime.PYTHON_3_12`. Terraform: `runtime = \"python3.12\"`. Serverless: `runtime: python3.12`."
      - "Re-test: Python 3.12 removed distutils and imp and moved the collections ABCs — see the related /fix pages."
      - "Redeploy and confirm with `aws lambda get-function-configuration --function-name <name> --query Runtime`."
    source_url: "https://docs.aws.amazon.com/lambda/latest/dg/lambda-runtimes.html"
    related_migrate: lambda-python-3.9-eol
    kit: python-pivot

  - slug: node-module-version-mismatch
    error: "Error: The module was compiled against a different Node.js version using NODE_MODULE_VERSION"
    context: "Node.js 22"
    summary: "A precompiled native addon was built for a different Node.js ABI than the one now running."
    cause: "Native Node addons (sharp, bcrypt, better-sqlite3, canvas, …) are tied to the Node major version's ABI (NODE_MODULE_VERSION). Upgrading the Lambda/container runtime to Node 22 without rebuilding or bumping these packages triggers the mismatch."
    fix_steps:
      - "Rebuild native modules against the new Node version: `rm -rf node_modules && npm install` (or `npm rebuild`)."
      - "If the package has no Node 22 prebuild, upgrade it to a version that does (e.g. sharp >= 0.33.0, bcrypt >= 5.1.1, better-sqlite3 >= 11.0.0)."
      - "For dead packages with no Node 22 build (node-sass, fibers, grpc), replace them (sass, native timers, @grpc/grpc-js)."
      - "Build the deployment package on the same Node major version Lambda will run."
    source_url: "https://docs.aws.amazon.com/lambda/latest/dg/lambda-runtimes.html"
    related_migrate: lambda-node.js-20-phase-1
    kit: lambda-lifeline

  - slug: node-sass-deprecated-unsupported
    error: "Node Sass does not yet support your current environment"
    context: "Node.js 22"
    summary: "node-sass (LibSass) is deprecated and has no prebuilt binary for current Node versions."
    cause: "node-sass wraps LibSass, which is end-of-life. It ships no Node 22 prebuild, so installs fail to find a compatible binary on new runtimes."
    fix_steps:
      - "Replace node-sass with Dart Sass: `npm uninstall node-sass && npm install -D sass`."
      - "The `sass` package is pure JS (no native build) and is a near drop-in for most build pipelines."
      - "Update any tooling config that names `node-sass` explicitly (e.g. webpack sass-loader `implementation: require('sass')`)."
    source_url: "https://sass-lang.com/blog/libsass-is-deprecated/"
    related_migrate: lambda-node.js-20-phase-1
    kit: lambda-lifeline

  - slug: datetime-utcnow-deprecated
    error: "DeprecationWarning: datetime.datetime.utcnow() is deprecated"
    context: "Python 3.12"
    summary: "datetime.utcnow() is deprecated in Python 3.12 because it returns a naive (timezone-unaware) datetime."
    cause: "Python 3.12 deprecated utcnow() and utcfromtimestamp() to push code toward timezone-aware datetimes. The warning becomes noise in logs and is scheduled for eventual removal."
    fix_steps:
      - "Replace `datetime.datetime.utcnow()` with `datetime.datetime.now(datetime.timezone.utc)`."
      - "Replace `datetime.datetime.utcfromtimestamp(t)` with `datetime.datetime.fromtimestamp(t, datetime.timezone.utc)`."
      - "If you need a naive value for a legacy API, call `.replace(tzinfo=None)` explicitly after constructing an aware datetime."
    source_url: "https://docs.python.org/3/whatsnew/3.12.html"
    related_migrate: lambda-python-3.9-eol
    kit: python-pivot

  - slug: node-cannot-find-module-aws-sdk
    error: "Error: Cannot find module 'aws-sdk'"
    context: "AWS Lambda (Node.js 18+)"
    summary: "AWS SDK for JavaScript v2 is no longer bundled in the Node.js 18+ Lambda runtimes; only v3 (@aws-sdk/*) is preinstalled."
    cause: "Lambda preinstalled `aws-sdk` (v2) only on nodejs16.x and earlier. From nodejs18.x the runtime bundles AWS SDK for JavaScript v3 (the modular @aws-sdk/* clients) instead, so `require('aws-sdk')` resolves to nothing after the runtime upgrade."
    fix_steps:
      - "Preferred: migrate to v3 modular clients, e.g. `const { S3Client } = require('@aws-sdk/client-s3')` instead of `const AWS = require('aws-sdk')`."
      - "v3 also changes calls: clients return promises directly (no `.promise()`), and response shapes differ."
      - "Quick unblock: add `aws-sdk` to package.json and bundle it in the deployment package (no longer free/preinstalled, so it adds cold-start weight)."
      - "Rebuild and redeploy the package on the target Node version."
    source_url: "https://docs.aws.amazon.com/lambda/latest/dg/lambda-nodejs.html"
    related_migrate: lambda-node.js-18-eol
    kit: lambda-lifeline

  - slug: lambda-nodejs-runtime-no-longer-supported
    error: "The runtime parameter of nodejs18.x is no longer supported for creating or updating AWS Lambda functions"
    context: "AWS Lambda"
    summary: "AWS Lambda is blocking create/update operations on a deprecated Node.js runtime."
    cause: "Per the AWS Lambda runtime deprecation table, nodejs18.x is deprecated; AWS first blocks creating new functions on the runtime, then blocks updating existing ones. nodejs16.x and earlier are already blocked. The error fires when a deploy targets a runtime past its block date."
    fix_steps:
      - "Move to a supported runtime — AWS recommends nodejs22.x."
      - "SAM/CloudFormation: `Runtime: nodejs22.x`. CDK: `runtime: lambda.Runtime.NODEJS_22_X`. Terraform: `runtime = \"nodejs22.x\"`. Serverless: `runtime: nodejs22.x`."
      - "Rebuild native addons for the Node 22 ABI and switch the bundled aws-sdk v2 to @aws-sdk v3 — see the related /fix pages."
      - "Redeploy and confirm with `aws lambda get-function-configuration --function-name <name> --query Runtime`."
    source_url: "https://docs.aws.amazon.com/lambda/latest/dg/lambda-runtimes.html"
    related_migrate: lambda-node.js-18-eol
    kit: lambda-lifeline

  - slug: node-error-digital-envelope-routines-unsupported
    error: "Error: error:0308010C:digital envelope routines::unsupported"
    context: "Node.js 18+ (OpenSSL 3)"
    summary: "Node.js 17+ ships OpenSSL 3, which rejects the legacy hashing some older build tools rely on."
    cause: "OpenSSL 3 disables legacy algorithms (e.g. the MD4-based hashing webpack 4 uses by default). Upgrading a Lambda or container to a Node 18/20/22 runtime surfaces this during a build or in crypto calls."
    fix_steps:
      - "Durable fix: upgrade the offending tooling to an OpenSSL-3-safe version (e.g. webpack 5, react-scripts 5+)."
      - "Stopgap only: set `NODE_OPTIONS=--openssl-legacy-provider` to re-enable the legacy provider — this re-enables weak crypto, so treat it as temporary."
      - "In your own code, replace deprecated hashes (md4/md5 used for security) with sha256."
      - "Rebuild and redeploy on the target Node version."
    source_url: "https://nodejs.org/api/cli.html#--openssl-legacy-provider"
    related_migrate: lambda-node.js-18-eol
    kit: lambda-lifeline

  - slug: python-no-module-named-cgi
    error: "ModuleNotFoundError: No module named 'cgi'"
    context: "Python 3.13"
    summary: "The cgi and cgitb modules were removed in Python 3.13 (PEP 594, the 'dead batteries' cleanup)."
    cause: "cgi was deprecated in 3.11 and removed in 3.13. Code or a dependency still imports it — commonly for parse_qs or multipart parsing — and breaks after moving to a python3.13 runtime."
    fix_steps:
      - "Replace `cgi.parse_qs` with `urllib.parse.parse_qs`."
      - "Replace `cgi.escape` with `html.escape`."
      - "For multipart/form-data, use a maintained parser (e.g. `multipart`, `werkzeug`, or your web framework's)."
      - "Upgrade dependencies that still import cgi, then re-test on Python 3.13."
    source_url: "https://docs.python.org/3/whatsnew/3.13.html"
    related_migrate: lambda-python-3.11-eol
    kit: python-pivot

  - slug: python-asyncio-has-no-attribute-coroutine
    error: "AttributeError: module 'asyncio' has no attribute 'coroutine'"
    context: "Python 3.11"
    summary: "The legacy @asyncio.coroutine decorator was removed in Python 3.11."
    cause: "asyncio.coroutine was deprecated in 3.8 and removed in 3.11. Old async code (or a stale dependency) still uses the generator-based @asyncio.coroutine / `yield from` style."
    fix_steps:
      - "Rewrite generator-based coroutines as native `async def` functions and replace `yield from` with `await`."
      - "Upgrade dependencies that still use @asyncio.coroutine to current releases."
      - "Re-test on Python 3.11+ (the Lambda target is python3.12)."
    source_url: "https://docs.python.org/3/whatsnew/3.11.html"
    related_migrate: lambda-python-3.10-eol
    kit: python-pivot

  - slug: amazon-linux-2023-python2-command-not-found
    error: "/usr/bin/env: 'python2': No such file or directory"
    context: "Amazon Linux 2023"
    summary: "Amazon Linux 2023 ships no Python 2 — only Python 3 is available."
    cause: "Amazon Linux 2 shipped Python 2.7; AL2023 removed it entirely. Scripts with a `#!/usr/bin/python2` shebang, `python2` calls, or tools assuming Python 2 fail on AL2023."
    fix_steps:
      - "Port the script to Python 3 and use a `python3` shebang/interpreter."
      - "Install a specific Python 3 minor version by name if needed, e.g. `sudo dnf install -y python3.11`."
      - "Update Dockerfiles, user-data, and CI that invoke `python2` / `pip2`."
      - "There is no supported way to install Python 2 on AL2023 — migrate the code."
    source_url: "https://docs.aws.amazon.com/linux/al2023/ug/compare-with-al2.html"
    related_migrate: amazon-linux-2-eol
    kit: al2023-gate

  - slug: amazon-linux-2023-ntpd-service-not-found
    error: "Failed to start ntpd.service: Unit ntpd.service not found."
    context: "Amazon Linux 2023"
    summary: "Amazon Linux 2023 uses chrony for time sync; the ntpd service no longer exists."
    cause: "Amazon Linux 2 used ntpd; AL2023 standardizes on chrony (chronyd). user-data or config management that enables/starts ntpd fails on AL2023."
    fix_steps:
      - "Use chrony instead: `sudo dnf install -y chrony && sudo systemctl enable --now chronyd`."
      - "Migrate any custom `/etc/ntp.conf` settings to `/etc/chrony.conf`."
      - "Update cloud-init / Ansible / Packer steps that referenced ntpd."
      - "Verify with `chronyc sources`."
    source_url: "https://docs.aws.amazon.com/linux/al2023/ug/compare-with-al2.html"
    related_migrate: amazon-linux-2-eol
    kit: al2023-gate

  - slug: node-punycode-module-deprecated
    error: "[DEP0040] DeprecationWarning: The `punycode` module is deprecated"
    context: "Node.js 22"
    summary: "The built-in punycode module is deprecated (DEP0040) and is slated for removal."
    cause: "Node deprecated the built-in punycode module in favor of the userland package. The warning appears on Node 18+ and is loudest on Node 22, often emitted by a transitive dependency."
    fix_steps:
      - "In your own code, depend on the userland package: `npm install punycode` then `require('punycode/')` (note the trailing slash)."
      - "If it comes from a dependency, upgrade it — many libraries have dropped the built-in punycode."
      - "Find the source with `node --trace-deprecation`."
      - "It is a warning, not a breaker — but resolve it before the module is removed in a future major."
    source_url: "https://nodejs.org/api/punycode.html"
    related_migrate: lambda-node.js-18-eol
    kit: lambda-lifeline

  - slug: node-crypto-createcipher-is-not-a-function
    error: "TypeError: crypto.createCipher is not a function"
    context: "Node.js 22"
    summary: "crypto.createCipher and crypto.createDecipher were removed in Node.js 22."
    cause: "Deprecated since Node 10 (DEP0106) for using a weak, salt-less MD5 key derivation and a static IV, createCipher/createDecipher were removed in Node.js 22. Code (or a dependency) still calls them and now throws after the runtime upgrade."
    fix_steps:
      - "Switch to `crypto.createCipheriv(algorithm, key, iv)` / `crypto.createDecipheriv(...)` with an explicit key and IV."
      - "Derive the key with `crypto.scryptSync(password, salt, keylen)` (or `crypto.pbkdf2`) and a random IV from `crypto.randomBytes(16)`; store the IV alongside the ciphertext."
      - "To read legacy data made with the old createCipher, re-implement its OpenSSL EVP_BytesToKey(MD5) derivation once, then re-encrypt under the new scheme."
      - "Upgrade any dependency that still calls createCipher to a current release."
    source_url: "https://nodejs.org/api/deprecations.html"
    related_migrate: lambda-node.js-18-eol
    kit: lambda-lifeline

  - slug: python-no-module-named-telnetlib
    error: "ModuleNotFoundError: No module named 'telnetlib'"
    context: "Python 3.13"
    summary: "telnetlib was removed in Python 3.13 (PEP 594, the 'dead batteries' cleanup)."
    cause: "telnetlib was deprecated in 3.11 and removed in 3.13. Code or a dependency still imports it — usually for device/network automation — and breaks after moving to a python3.13 runtime."
    fix_steps:
      - "Switch to a maintained library such as `telnetlib3` (asyncio-based) or `Exscript`."
      - "Where the device supports it, prefer SSH (`paramiko` / `netmiko`) over Telnet."
      - "Pinning to python3.12 still ships telnetlib, but 3.12 is itself on the Lambda deprecation track — treat it as a stopgap only."
      - "Re-test on Python 3.13 after swapping the import."
    source_url: "https://docs.python.org/3/whatsnew/3.13.html"
    related_migrate: lambda-python-3.11-eol
    kit: python-pivot

  - slug: python-no-module-named-crypt
    error: "ModuleNotFoundError: No module named 'crypt'"
    context: "Python 3.13"
    summary: "The crypt module was removed in Python 3.13 (PEP 594)."
    cause: "crypt (Unix password hashing) was deprecated in 3.11 and removed in 3.13. Code that hashed or verified system-style passwords with crypt.crypt breaks on a python3.13 runtime."
    fix_steps:
      - "For new hashing, use a dedicated library (`passlib`, `bcrypt`, `argon2-cffi`) or `hashlib.scrypt`."
      - "To verify existing crypt(3) hashes, use `passlib.hash` — it implements the sha512_crypt/sha256_crypt schemes crypt produced."
      - "There is no stdlib replacement by design; do not try to reintroduce crypt."
      - "Re-test on Python 3.13."
    source_url: "https://docs.python.org/3/whatsnew/3.13.html"
    related_migrate: lambda-python-3.11-eol
    kit: python-pivot

  - slug: python-no-module-named-lib2to3
    error: "ModuleNotFoundError: No module named 'lib2to3'"
    context: "Python 3.13"
    summary: "lib2to3 (and the 2to3 tool) were removed in Python 3.13 (PEP 594)."
    cause: "lib2to3 relied on a grammar that couldn't track new syntax; deprecated in 3.11, removed in 3.13. Build tooling or a dependency that imported lib2to3 (often as a code fixer) breaks on a python3.13 runtime."
    fix_steps:
      - "Replace lib2to3-based fixers with a maintained concrete-syntax-tree library: `LibCST` or `parso`."
      - "If a dependency pulled in lib2to3 transitively, upgrade it — most have dropped it."
      - "For a one-off Python 2→3 conversion, run 2to3 from an older Python (≤3.12) before upgrading the runtime."
      - "Re-test on Python 3.13."
    source_url: "https://docs.python.org/3/whatsnew/3.13.html"
    related_migrate: lambda-python-3.11-eol
    kit: python-pivot
