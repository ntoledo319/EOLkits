name: SEO pages regeneration

on:
  schedule:
    - cron: '17 4 * * *'  # Nightly
  workflow_dispatch:

permissions:
  contents: write

# A queued nightly run must not overwrite a freshly deployed build.
concurrency:
  group: seo-pages
  cancel-in-progress: false

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install jinja2 pyyaml
      - name: Rebuild static site
        run: python apps/web/build.py
      - name: Commit if changed
        run: |
          git config user.name "rupture-bot"
          git config user.email "rupture-bot@users.noreply.github.com"
          # Commit the FULL generated set. The previous subset omitted
          # index/audit/pack/license/partners/legal, so regressions to those
          # pages would silently never be committed. Exclude the externally
          # generated status file so we don't fight status-synth.
          git add docs/
          git reset -q -- docs/status/data.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(seo): nightly regeneration"
            git pull --rebase origin main
            git push
          else
            echo "no SEO changes"
          fi
