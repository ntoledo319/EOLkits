    severity: high
    kit: python-pivot
    url: "https://docs.aws.amazon.com/lambda/latest/dg/lambda-runtimes.html"
    tags: [lambda, python, runtime]
    breaking_changes:
      - "distutils module removed"
      - "imp module removed"
      - "collections.Mapping deprecated"
      - "Native wheels may not be available"

