    severity: high
    kit: python-pivot
    url: "https://docs.aws.amazon.com/lambda/latest/dg/lambda-runtimes.html"
    tags: [lambda, python, runtime]
    breaking_changes:
      - "datetime.utcnow() deprecated"
      - "Various typing changes"

