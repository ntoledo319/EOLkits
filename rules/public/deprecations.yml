  - name: "Lambda Node.js 18 EOL"
    service: "AWS Lambda"
    resource_type: "function"
    date: "2027-02-01"
    block_update_date: "2027-03-03"
    description: "Node.js 18 Lambda runtime (Amazon Linux 2) deprecated 2025-09-01. Per the AWS Lambda runtime deprecation table, AWS blocks creating new nodejs18.x functions on 2027-02-01 and updating existing ones on 2027-03-03 — part of the synchronized Q1-2027 runtime-block cluster. nodejs18.x is one of the most common runtimes still in production."
    severity: high
